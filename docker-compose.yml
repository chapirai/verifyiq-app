services:
  postgres:
    image: postgres:16-alpine
    container_name: verifyiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DBNAME:-Company}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - '${PG_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PG_USER:-postgres} -d ${PG_DBNAME:-Company}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: verifyiq-redis
    restart: unless-stopped
    command: >-
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-server --requirepass \"$$REDIS_PASSWORD\"; else redis-server; fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: verifyiq-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ':9001'
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: verifyiq-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-4000}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      PG_DBNAME: ${PG_DBNAME:-Company}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-verifyiq-documents}
      # Development-only defaults (from .env.example) – override in production via .env or environment variables
      JWT_SECRET: ${JWT_SECRET:-WZ68qSjcW6YNHkHetT39/vBJFmKrzzr53iv+nFpxm5Y=}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-uppyoy6DH7cb/nO5wdEdELl8FgDlhF9qWxugzQmzta4=}
      # Bolagsverket API credentials – set real values in .env before using company-lookup features
      BV_CLIENT_ID: ${BV_CLIENT_ID:-placeholder-bv-client-id}
      BV_CLIENT_SECRET: ${BV_CLIENT_SECRET:-placeholder-bv-client-secret}
      API_BASE_URL: http://localhost:${PORT:-4000}/api/v1
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - '${PORT:-4000}:4000'

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: verifyiq-frontend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
    depends_on:
      - backend
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
  minio_data:
